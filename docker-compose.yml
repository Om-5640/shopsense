version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: shopping_agent
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shopping_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
