name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Python backend ──────────────────────────────────────────────
  python:
    name: Python (lint + type-check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Check for leaked secrets
        run: |
          # Patterns: Gemini (AIza...), Groq (gsk_...), Cerebras (csk-...), OpenRouter (sk-or-...),
          # Mistral (sk-..., varies), Serper (long hex/alphanumeric), Cohere, HuggingFace (hf_...),
          # and raw API_KEY= assignments with values.
          if grep -rE \
               "AIza[A-Za-z0-9_-]{30,}|gsk_[A-Za-z0-9]{30,}|csk-[A-Za-z0-9]{30,}|sk-or-[A-Za-z0-9]{30,}|hf_[A-Za-z0-9]{20,}|[a-f0-9]{40,}|API_KEY\s*=\s*['\"][A-Za-z0-9_\-\.]{20,}['\"]|SERPER_API_KEY\s*=\s*['\"][^'\"]{8,}['\"]|MISTRAL_API_KEY\s*=\s*['\"][^'\"]{8,}['\"]|CEREBRAS_API_KEY\s*=\s*['\"][^'\"]{8,}['\"]" \
               --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" \
               --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "ERROR: Possible API keys found in committed files!"
            exit 1
          fi
          echo "Secret scan passed."

      - name: Lint with ruff (if installed)
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501 || true

      - name: Check API server imports
        run: |
          cd api
          python -c "import main; print('API imports OK')"
        env:
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          SERPER_API_KEY: dummy
          OPENROUTER_API_KEY: dummy

      - name: Integration smoke tests
        run: |
          python -m pytest evals/integration/smoke_test.py evals/integration/orchestration_test.py -v
        env:
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          SERPER_API_KEY: dummy
          OPENROUTER_API_KEY: dummy

      - name: Intelligence eval (regression gate)
        run: |
          python -m evals ci
        env:
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          SERPER_API_KEY: dummy
          OPENROUTER_API_KEY: dummy

  # ── Next.js frontend ────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          DATABASE_URL: file:./prisma/shopping.db
