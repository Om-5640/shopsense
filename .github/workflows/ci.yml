name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend ──────────────────────────────────────────────
  python:
    name: Python (lint + type-check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Check for leaked secrets
        run: |
          if grep -rE "AIza[A-Za-z0-9_-]{30,}|gsk_[A-Za-z0-9]{30,}|csk-[A-Za-z0-9]{30,}|sk-or-[A-Za-z0-9]{30,}" \
               --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" \
               --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "ERROR: Possible API keys found in committed files!"
            exit 1
          fi
          echo "Secret scan passed."

      - name: Lint with ruff (if installed)
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501 || true

      - name: Check API server imports
        run: |
          cd api
          python -c "import main; print('API imports OK')"
        env:
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          SERPER_API_KEY: dummy
          OPENROUTER_API_KEY: dummy

  # ── Next.js frontend ────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          DATABASE_URL: file:./prisma/shopping.db
